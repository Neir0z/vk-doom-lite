<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <title>DOOM-LITE | VK Games</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <!-- Загрузочный экран -->
  <div id="loader" class="loader">
    <div class="loader__bar"></div>
    <p>ИНИЦИАЛИЗАЦИЯ...</p>
  </div>

  <canvas id="game" class="game-canvas"></canvas>

  <!-- UI -->
  <div id="ui" class="ui hidden">
    <div class="hud">
      <div class="hud__stat">❤️ <span id="hud-health">100</span></div>
      <div class="hud__stat"> <span id="hud-ammo">30</span></div>
      <div class="hud__stat" style="color:#fbbf24">💰 <span id="hud-money">0</span></div>
      <div class="hud__stat">🌊 <span id="hud-wave">1</span></div>
    </div>
    
    <!-- Контролы для мобилок -->
    <div id="joystick" class="joystick">
      <div class="joystick__base"></div>
      <div class="joystick__stick"></div>
    </div>
    <button id="btn-shoot" class="btn-shoot">🔥</button>

    <!-- Меню Магазина (Появляется между волнами) -->
    <dialog id="modal-shop" class="modal shop-modal">
      <div class="modal__content">
        <h2 class="accent-text">ВОЛНА ПРОЙДЕНА</h2>
        <p class="shop-balance">Доступно: <span id="shop-money">0</span> 💰</p>
        
        <div class="shop-grid">
          <button id="btn-buy-health" class="shop-item">
            <span class="shop-icon">❤️</span>
            <span class="shop-desc">+50 HP</span>
            <span class="shop-price">50 💰</span>
          </button>
          <button id="btn-buy-ammo" class="shop-item">
            <span class="shop-icon">🔫</span>
            <span class="shop-desc">+15 Ammo</span>
            <span class="shop-price">30 💰</span>
          </button>
        </div>

        <button id="btn-next-wave" class="btn btn--primary" style="margin-top: 20px; width: 100%;">
          СЛЕДУЮЩАЯ ВОЛНА 
        </button>
      </div>
    </dialog>

    <!-- Меню Game Over -->
    <dialog id="modal-over" class="modal">
      <div class="modal__content">
        <h2 class="accent-text">GAME OVER</h2>
        <p>Выживано волн: <span id="final-wave" class="big-score">0</span></p>
        <p>Рекорд (VK): <span id="highscore-display" class="highscore">0</span></p>
        <button id="btn-restart" class="btn btn--primary">🔄 В БОЙ</button>
      </div>
    </dialog>
  </div>

  <script src="lib/vk-bridge.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
